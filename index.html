        <script type="text/javascript">
            setTimeout(function() {
                if (typeof network === 'undefined') return;

                var allNodes = nodes.get();
                allNodes.forEach(function(n) {
                    n.originalColor = n.color;
                    n.originalFontColor = (n.font && n.font.color) ? n.font.color : "white";
                });
                nodes.update(allNodes);

                var allEdges = edges.get();
                allEdges.forEach(function(e) { e.originalColor = e.color; });
                edges.update(allEdges);

                // Reusable function to highlight a node and its neighbors
                function applyHighlight(selectedNodeId) {
                    var connectedNodes = network.getConnectedNodes(selectedNodeId);
                    
                    var updateNodes = [];
                    allNodes.forEach(function(n) {
                        if (n.id === selectedNodeId || connectedNodes.includes(n.id)) {
                            updateNodes.push({id: n.id, color: n.originalColor, font: {color: n.originalFontColor}});
                        } else {
                            updateNodes.push({id: n.id, color: "rgba(50,50,50,0.3)", font: {color: "rgba(50,50,50,0.1)"}});
                        }
                    });
                    nodes.update(updateNodes);

                    var connectedEdges = network.getConnectedEdges(selectedNodeId);
                    var updateEdges = [];
                    allEdges.forEach(function(e) {
                        if (connectedEdges.includes(e.id)) {
                            updateEdges.push({id: e.id, color: e.originalColor});
                        } else {
                            updateEdges.push({id: e.id, color: "rgba(50,50,50,0.02)"});
                        }
                    });
                    edges.update(updateEdges);
                }

                // 1. Mouse Click Logic
                network.on("selectNode", function (params) {
                    applyHighlight(params.nodes[0]);
                });

                network.on("deselectNode", function (params) {
                    var updateNodes = [];
                    allNodes.forEach(function(n) { updateNodes.push({id: n.id, color: n.originalColor, font: {color: n.originalFontColor}}); });
                    nodes.update(updateNodes);

                    var updateEdges = [];
                    allEdges.forEach(function(e) { updateEdges.push({id: e.id, color: e.originalColor}); });
                    edges.update(updateEdges);
                });

                // 2. Search Bar Button Logic
                document.getElementById('searchBtn').addEventListener('click', function() {
                    var searchTerm = document.getElementById('courseSearch').value.toLowerCase().trim();
                    var targetId = null;

                    allNodes.forEach(function(n) {
                        if (n.label && n.label.toLowerCase() === searchTerm) {
                            targetId = n.id;
                        }
                    });

                    if (targetId !== null) {
                        // Select the node so the physics engine knows it's active
                        network.selectNodes([targetId]);
                        
                        // Move the camera to the searched node with a cool animation!
                        network.focus(targetId, {
                            scale: 1.2,
                            animation: { duration: 1000, easingFunction: 'easeInOutQuad' }
                        });
                        
                        // Trigger the highlight feature
                        applyHighlight(targetId);
                    } else {
                        alert("Course not found! Please make sure you spell it exactly as it appears in the dropdown.");
                    }
                });

            }, 2500); // Give the physics engine 2.5 seconds to settle before hooking up logic
        </script>
